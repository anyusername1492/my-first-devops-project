name: Check Documentation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify README.md and about.md exist and are not empty
        run: |
          for file in README.md about.md; do
            if [ ! -f "$file" ]; then
              echo "❌ $file not found!"
              exit 1
            fi
            if [ ! -s "$file" ]; then
              echo "❌ $file is empty!"
              exit 1
            fi
            echo "✅ $file OK"
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: markdownlint .

  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check all links in Markdown files
        run: find . -name "*.md" -type f -print0 | xargs -0 -n 1 markdown-link-check --quiet
