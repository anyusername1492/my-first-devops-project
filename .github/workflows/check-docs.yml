name: Check Documentation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify README.md exists and is not empty
        run: |
          if [ ! -f "README.md" ]; then
            echo "❌ README.md not found!"
            exit 1
          fi
          if [ ! -s "README.md" ]; then
            echo "❌ README.md is empty!"
            exit 1
          fi
          echo "✅ README.md OK"

      - name: Verify about.md exists and is not empty
        run: |
          if [ ! -f "about.md" ]; then
            echo "❌ about.md not found!"
            exit 1
          fi
          if [ ! -s "about.md" ]; then
            echo "❌ about.md is empty!"
            exit 1
          fi
          echo "✅ about.md OK"
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: markdownlint .
